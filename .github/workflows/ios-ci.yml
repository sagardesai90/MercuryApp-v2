name: iOS CI

on:
  push:
    branches: [main, master]
    paths:
      - 'ios-v2/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'ios-v2/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-14
    defaults:
      run:
        working-directory: ios-v2
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --config .swiftlint.yml --reporter github-actions-logging

  test:
    name: Unit Tests
    runs-on: macos-14
    defaults:
      run:
        working-directory: ios-v2
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios-v2/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios-v2/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: pod install

      - name: Run Tests
        run: |
          xcodebuild test \
            -workspace "Mercury Jacket.xcworkspace" \
            -scheme "Mercury Jacket" \
            -destination "platform=iOS Simulator,name=iPhone 15,OS=latest" \
            -resultBundlePath TestResults \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty --color
