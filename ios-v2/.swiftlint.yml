included:
  - Mercury Jacket

excluded:
  - Pods
  - Mercury JacketTests

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_filter_count
  - first_where
  - last_where
  - redundant_nil_coalescing
  - unneeded_parentheses_in_closure_argument

disabled_rules:
  - trailing_whitespace
  - todo
  - nesting

force_cast: warning
force_unwrapping: warning
force_try: warning

line_length:
  warning: 160
  error: 250
  ignores_urls: true

file_length:
  warning: 500
  error: 800

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 15
  error: 25

identifier_name:
  min_length:
    warning: 1
  max_length:
    warning: 60

reporter: xcode
